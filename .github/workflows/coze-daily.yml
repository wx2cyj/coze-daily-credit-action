name: Coze daily credit

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Coze daily action
        env:
          COZE_STORAGE_STATE_JSON: ${{ secrets.COZE_STORAGE_STATE_JSON }}
          COZE_COOKIES_JSON: ${{ secrets.COZE_COOKIES_JSON }}
          BARK_PUSH_URL: ${{ secrets.BARK_PUSH_URL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          PLAYWRIGHT_TIMEOUT_MS: "30000"
          POST_LOAD_WAIT_MS: "5000"
        run: npm start

      - name: Update Coze cookie secret
        if: success()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          COZE_SECRET_NAME: COZE_COOKIES_JSON
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run update-secret

      - name: Notify on success
        if: success()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ.get("PUSHPLUS_TOKEN", "").strip()
          if not token:
              print("PUSHPLUS_TOKEN is not set; skip success notification.")
              raise SystemExit(0)

          title = "Coze每日积分已领取 ✅"
          content = "\n".join(
              item for item in [
                  "Coze 每日积分已成功领取！",
                  f"运行记录：{os.environ.get('RUN_URL', '')}" if os.environ.get("RUN_URL") else "",
              ] if item
          )

          payload = {
              "token": token,
              "title": title,
              "content": content,
              "template": "txt",
          }
          topic = os.environ.get("PUSHPLUS_TOPIC", "").strip()
          if topic:
              payload["topic"] = topic

          request = urllib.request.Request(
              "https://www.pushplus.plus/send",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  body = response.read().decode("utf-8", errors="replace")
              result = json.loads(body)
              print(f"pushplus raw response: {json.dumps(result, ensure_ascii=False)}")
              if result.get("code") != 200:
                  print(f"pushplus returned code {result.get('code')}: {result.get('msg') or body}")
              else:
                  print(f"Success! shortCode={result.get('data', '')}")
          except Exception as error:
              print(f"pushplus notification failed: {error}")
          PY

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coze-failure
          path: artifacts/
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        env:
          BARK_PUSH_URL: ${{ secrets.BARK_PUSH_URL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          if Path("artifacts/notification.sent").exists():
              print("Failure notification was already sent by the script; skip fallback notification.")
              raise SystemExit(0)

          title = "Coze每日积分失败"
          content = "\n".join(
              item for item in [
                  "GitHub Actions 运行失败。",
                  f"仓库：{os.environ.get('REPOSITORY', '')}" if os.environ.get("REPOSITORY") else "",
                  f"运行记录：{os.environ.get('RUN_URL', '')}" if os.environ.get("RUN_URL") else "",
              ] if item
          )

          def send_bark():
              base = os.environ.get("BARK_PUSH_URL", "").strip().rstrip("/")
              if not base:
                  print("BARK_PUSH_URL is not set; skip Bark notification.")
                  return False

              url = f"{base}/{urllib.parse.quote(title, safe='')}/{urllib.parse.quote(content, safe='')}"
              try:
                  with urllib.request.urlopen(url, timeout=20) as response:
                      print("Bark notification sent.")
                      return 200 <= response.status < 300
              except Exception as error:
                  print(f"Bark notification failed: {error}")
                  return False

          def send_pushplus():
              token = os.environ.get("PUSHPLUS_TOKEN", "").strip()
              if not token:
                  print("PUSHPLUS_TOKEN is not set; skip pushplus notification.")
                  return False

              payload = {
                  "token": token,
                  "title": title,
                  "content": content,
                  "template": "txt",
              }
              topic = os.environ.get("PUSHPLUS_TOPIC", "").strip()
              if topic:
                  payload["topic"] = topic

              request = urllib.request.Request(
                  "https://www.pushplus.plus/send",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      body = response.read().decode("utf-8", errors="replace")
                  result = json.loads(body)
                  if result.get("code") != 200:
                      print(f"pushplus returned code {result.get('code')}: {result.get('msg') or body}")
                      return False
                  print("pushplus notification sent.")
                  return True
              except Exception as error:
                  print(f"pushplus notification failed: {error}")
                  return False

          results = [send_bark(), send_pushplus()]
          if not any(results):
              print("No failure notification was sent. Check whether notification secrets are configured.")
          PY

      - name: Upload updated storage state
        if: ${{ success() && vars.UPLOAD_UPDATED_STORAGE_STATE == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: coze-storage-state
          path: artifacts/storage_state.updated.json
          if-no-files-found: ignore
          retention-days: 3
